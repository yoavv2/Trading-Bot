app:
  name: Trading Strategy Platform
  slug: trading-platform
  version: 0.1.0
  environment: local
  operator_mode: single_user

api:
  host: 0.0.0.0
  port: 8000
  base_path: /api/v1

logging:
  level: INFO
  format: json
  service: trading-platform-api

database:
  host: localhost
  port: 5432
  name: trading_platform
  user: trading_platform
  password: trading_platform
  echo: false
  driver: psycopg

readiness:
  dependency_checks_enabled: true
  require_database: true

paths:
  data_dir: .data
  strategy_config_dir: config/strategies

market_data:
  polygon:
    base_url: https://api.polygon.io
    adjusted: true
    max_retries: 3
    retry_backoff_factor: 0.5
    timeout_seconds: 30
  ingest:
    default_lookback_days: 365
    universe:
      - SPY
      - QQQ
      - AAPL
      - MSFT
      - NVDA
      - AMD
      - META
      - AMZN
      - GOOGL
      - TSLA

backtest:
  initial_capital: 100000
  fill_strategy: next_session_open
  allocation_model: equal_weight_slots
  max_concurrent_positions: 10
  fees:
    commission_per_order: 0.0
  slippage:
    model: bps
    bps: 5.0
  calendar:
    exchange: XNYS
  metadata:
    provider: polygon
    universe:
      - SPY
      - QQQ
      - AAPL
      - MSFT
      - NVDA
      - AMD
      - META
      - AMZN
      - GOOGL
      - TSLA

portfolio:
  starting_cash: 100000
  max_strategy_allocation_pct: 1.0
  max_total_portfolio_allocation_pct: 1.0
  stale_data_max_session_lag: 0

broker:
  provider: alpaca
  alpaca:
    base_url: https://paper-api.alpaca.markets
    api_key: ""
    api_secret: ""
    max_retries: 3
    retry_backoff_factor: 0.5
    timeout_seconds: 30

execution:
  default_order_type: market
  default_time_in_force: day
  client_order_id_prefix: tp
  safety:
    repeated_failure_threshold: 3
    block_on_unresolved_reconciliation: true
  paper_session_runner:
    default_strategy_id: trend_following_daily
    trigger_source: paper_session_runner
    cadence: daily
    scheduled_hour_utc: 20
    scheduled_minute_utc: 5
