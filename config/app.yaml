app:
  name: Trading Strategy Platform
  slug: trading-platform
  version: 0.1.0
  environment: local
  operator_mode: single_user

api:
  host: 0.0.0.0
  port: 8000
  base_path: /api/v1

logging:
  level: INFO
  format: json
  service: trading-platform-api

database:
  host: db
  port: 5432
  name: trading_platform
  user: trading_platform
  password: trading_platform
  echo: false
  driver: psycopg

readiness:
  dependency_checks_enabled: false
  require_database: false

paths:
  data_dir: .data
  strategy_config_dir: config/strategies

