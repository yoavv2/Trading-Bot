app:
  name: Trading Strategy Platform
  slug: trading-platform
  version: 0.1.0
  environment: local
  operator_mode: single_user

api:
  host: 0.0.0.0
  port: 8000
  base_path: /api/v1

logging:
  level: INFO
  format: json
  service: trading-platform-api

database:
  host: localhost
  port: 5432
  name: trading_platform
  user: trading_platform
  password: trading_platform
  echo: false
  driver: psycopg

readiness:
  dependency_checks_enabled: true
  require_database: true

paths:
  data_dir: .data
  strategy_config_dir: config/strategies

market_data:
  polygon:
    base_url: https://api.polygon.io
    adjusted: true
    max_retries: 3
    retry_backoff_factor: 0.5
    timeout_seconds: 30
  ingest:
    default_lookback_days: 365
    universe:
      - SPY
      - QQQ
      - AAPL
      - MSFT
      - NVDA
      - AMD
      - META
      - AMZN
      - GOOGL
      - TSLA
  calendar:
    exchange: XNYS
  metadata:
    provider: polygon
    universe:
      - SPY
      - QQQ
      - AAPL
      - MSFT
      - NVDA
      - AMD
      - META
      - AMZN
      - GOOGL
      - TSLA
