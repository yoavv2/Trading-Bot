# Render Blueprint — FREE-TIER DEPLOYMENT CHECKPOINT (not production-ready).
#
# Scope: FastAPI READ-ONLY API only.
#   - Database is EXTERNAL (Neon free Postgres), not a Render-managed DB.
#   - The worker (trading_platform.worker) is NOT deployed here — it stays on
#     Docker / manual CLI. No paper execution, broker sync, or kill-switch jobs.
#
# Free-tier caveats (accepted):
#   - The web service sleeps after ~15 min idle; the first request after sleep
#     is a slow cold start.
#   - The service is PUBLIC and UNAUTHENTICATED. Every route is read-only (GET),
#     so this is a data-disclosure risk, not a control/execution risk — but it is
#     still not production-safe.
#
# Setup: Render Dashboard -> New -> Blueprint -> connect this repo. Render reads
# this file, then prompts for the four DB secrets below (sync: false). Paste the
# values from your Neon connection details.

services:
  - type: web
    name: trading-platform-api
    runtime: docker
    plan: free
    # Pick the region closest to your Neon project to minimize DB latency.
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # No `dockerCommand` here on purpose: it would OVERRIDE the Dockerfile CMD,
    # and Render's dockerCommand string-parser mangles `&&`/nested quotes
    # (treats the whole string as one command → `not found`). The migrate-then-
    # serve chain lives in the Dockerfile CMD (exec-form `sh -c`) instead, which
    # Docker hands to the kernel verbatim.
    envVars:
      # Honest environment label for the deployed API.
      - key: TRADING_PLATFORM_APP__ENVIRONMENT
        value: staging
      # Config lives at /app/config in the image (Dockerfile: WORKDIR /app +
      # COPY config ./config). The settings loader derives its default config
      # path from the *installed package* location (site-packages) once the app
      # is `pip install`ed, which points outside /app and fails. These absolute
      # overrides are passed through verbatim by the loader (they respect
      # TRADING_PLATFORM_CONFIG_FILE / _STRATEGY_CONFIG_DIR), fixing path
      # resolution without touching application code.
      - key: TRADING_PLATFORM_CONFIG_FILE
        value: /app/config/app.yaml
      - key: TRADING_PLATFORM_STRATEGY_CONFIG_DIR
        value: /app/config/strategies
      # --- Neon Postgres connection (entered in the Render dashboard) ---
      # HOST: use the Neon DIRECT host, e.g. ep-xxxx-xxxx.<region>.aws.neon.tech
      - key: TRADING_PLATFORM_DATABASE__HOST
        sync: false
      - key: TRADING_PLATFORM_DATABASE__PORT
        value: "5432"
      - key: TRADING_PLATFORM_DATABASE__NAME
        sync: false
      - key: TRADING_PLATFORM_DATABASE__USER
        sync: false
      - key: TRADING_PLATFORM_DATABASE__PASSWORD
        sync: false
      # Polygon / Alpaca credentials are intentionally omitted: they are consumed
      # only by the worker at ingest/execution time. The read-only API does not
      # instantiate a market-data or broker client, so it does not need them.
